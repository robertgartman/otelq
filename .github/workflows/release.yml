# Builds and publishes otelq through Trusted Publishing (OIDC), never long-lived
# API tokens. Trigger it MANUALLY — from the GitHub UI (Actions -> Release ->
# Run workflow) or the CLI (gh workflow run release.yml):
#
#   target = testpypi (default) -> REHEARSAL. Publishes a unique .dev timestamp
#       version to TestPyPI. Nothing is committed or tagged.
#   target = pypi               -> REAL RELEASE. Run it ON the release tag vX.Y.Z
#       (UI: pick the tag in the "Run workflow" ref dropdown; CLI:
#       gh workflow run release.yml --ref vX.Y.Z -f target=pypi). It publishes
#       exactly that tagged commit to PyPI. The release-please PR (see
#       release-please.yml) bumps the version and creates that tag on merge, so
#       we only ever ship a version that was cut through release-please.
#
# A GitHub Release being *published* also triggers a real PyPI publish, as a
# fallback for a hand-made release.
#
# Both targets use Trusted Publishing (OIDC). Configure each index with this
# repository, workflow filename `release.yml`, and the matching GitHub
# environment name: TestPyPI -> `pypitest`, PyPI -> `pypi`.

name: Release

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Publish target (pypi = real release of the current tagged version)"
        type: choice
        options: [testpypi, pypi]
        default: testpypi
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  pypi-publish:
    name: Build, publish, and smoke-test package
    runs-on: ubuntu-latest
    env:
      # Real PyPI release when a GitHub Release was published, or when manually
      # dispatched with target=pypi. Otherwise (dispatch default) a TestPyPI
      # rehearsal.
      IS_PROD: ${{ github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.target == 'pypi') }}
    environment:
      name: ${{ (github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.target == 'pypi')) && 'pypi' || 'pypitest' }}
      url: ${{ (github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.target == 'pypi')) && 'https://pypi.org/p/otelq' || 'https://test.pypi.org/p/otelq' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Ruff check
        run: uvx ruff check .

      - name: Pytest
        env:
          PYTHONPATH: .
        run: uv run --with pytest --with "duckdb==1.5.3" pytest tests/ -v

      - name: Prepare package version
        run: |
          BASE_VERSION=$(uv version --short)

          if [[ "${IS_PROD}" == "true" ]]; then
            # A real release always runs on the tag — whether from the release
            # event or a manual pypi dispatch on the tag ref — so we build and
            # ship exactly the tagged commit, and the tag must match pyproject.
            if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
              echo "A PyPI release must run on a release tag. Re-run this workflow on tag vX.Y.Z (UI: pick the tag in 'Run workflow'; CLI: gh workflow run release.yml --ref vX.Y.Z -f target=pypi). The tag is created when the release-please PR merges." >&2
              exit 1
            fi
            TAG_VERSION="${GITHUB_REF_NAME#v}"
            if [[ "${TAG_VERSION}" != "${BASE_VERSION}" ]]; then
              echo "Release tag ${GITHUB_REF_NAME} does not match pyproject version ${BASE_VERSION}" >&2
              exit 1
            fi

            PACKAGE_VERSION="${BASE_VERSION}"
            echo "Publishing otelq ${PACKAGE_VERSION} to PyPI"
          else
            PACKAGE_VERSION="${BASE_VERSION}.dev$(date -u +%Y%m%d%H%M%S)"
            export PACKAGE_VERSION
            perl -0pi -e 's/^version = ".*"/version = "$ENV{PACKAGE_VERSION}"/m' pyproject.toml
            echo "Publishing otelq ${PACKAGE_VERSION} to TestPyPI"
          fi

          echo "PACKAGE_VERSION=${PACKAGE_VERSION}" >> "$GITHUB_ENV"

      - name: Build distributions
        run: uv build

      - name: Check distributions
        run: uvx twine check dist/*

      - name: Publish to TestPyPI
        if: env.IS_PROD != 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          verbose: true

      - name: Publish to PyPI
        if: env.IS_PROD == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true

      - name: Smoke-test TestPyPI package with uvx
        if: env.IS_PROD != 'true'
        run: |
          for attempt in 1 2 3 4 5 6; do
            if uvx \
              --default-index https://test.pypi.org/simple/ \
              --index https://pypi.org/simple/ \
              --index-strategy unsafe-best-match \
              --from "otelq==${PACKAGE_VERSION}" \
              otelq --help; then
              exit 0
            fi

            echo "TestPyPI package not available yet; retry ${attempt}/6"
            sleep 10
          done

          echo "Failed to install otelq ${PACKAGE_VERSION} from TestPyPI" >&2
          exit 1
