# Publishes otelq through the same release pipeline for both rehearsal and prod:
#   - workflow_dispatch -> TestPyPI, with a unique .dev timestamp version
#   - GitHub Release  -> PyPI, with the checked-in pyproject.toml version
#
# Both targets use Trusted Publishing (OIDC), not long-lived API tokens. Configure
# each index with this repository, workflow filename `release.yml`, and the
# matching GitHub environment name: TestPyPI -> `pypitest`, PyPI -> `pypi`.

name: Release

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  pypi-publish:
    name: Build, publish, and smoke-test package
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event_name == 'release' && 'pypi' || 'pypitest' }}
      url: ${{ github.event_name == 'release' && 'https://pypi.org/p/otelq' || 'https://test.pypi.org/p/otelq' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Ruff check
        run: uvx ruff check .

      - name: Pytest
        env:
          PYTHONPATH: .
        run: uv run --with pytest --with "duckdb==1.5.3" pytest tests/ -v

      - name: Prepare package version
        run: |
          BASE_VERSION=$(uv version --short)

          if [[ "${GITHUB_EVENT_NAME}" == "release" ]]; then
            TAG_VERSION="${GITHUB_REF_NAME#v}"
            if [[ "${TAG_VERSION}" != "${BASE_VERSION}" ]]; then
              echo "Release tag ${GITHUB_REF_NAME} does not match pyproject version ${BASE_VERSION}" >&2
              exit 1
            fi

            PACKAGE_VERSION="${BASE_VERSION}"
            echo "Publishing otelq ${PACKAGE_VERSION} to PyPI"
          else
            PACKAGE_VERSION="${BASE_VERSION}.dev$(date -u +%Y%m%d%H%M%S)"
            export PACKAGE_VERSION
            perl -0pi -e 's/^version = ".*"/version = "$ENV{PACKAGE_VERSION}"/m' pyproject.toml
            echo "Publishing otelq ${PACKAGE_VERSION} to TestPyPI"
          fi

          echo "PACKAGE_VERSION=${PACKAGE_VERSION}" >> "$GITHUB_ENV"

      - name: Build distributions
        run: uv build

      - name: Check distributions
        run: uvx twine check dist/*

      - name: Publish to TestPyPI
        if: github.event_name != 'release'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          verbose: true

      - name: Publish to PyPI
        if: github.event_name == 'release'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true

      - name: Smoke-test TestPyPI package with uvx
        if: github.event_name != 'release'
        run: |
          for attempt in 1 2 3 4 5 6; do
            if uvx \
              --default-index https://test.pypi.org/simple/ \
              --index https://pypi.org/simple/ \
              --index-strategy unsafe-best-match \
              --from "otelq==${PACKAGE_VERSION}" \
              otelq --help; then
              exit 0
            fi

            echo "TestPyPI package not available yet; retry ${attempt}/6"
            sleep 10
          done

          echo "Failed to install otelq ${PACKAGE_VERSION} from TestPyPI" >&2
          exit 1

      - name: Smoke-test PyPI package with uvx
        if: github.event_name == 'release'
        run: |
          for attempt in 1 2 3 4 5 6; do
            if uvx --from "otelq==${PACKAGE_VERSION}" otelq --help; then
              exit 0
            fi

            echo "PyPI package not available yet; retry ${attempt}/6"
            sleep 10
          done

          echo "Failed to install otelq ${PACKAGE_VERSION} from PyPI" >&2
          exit 1
