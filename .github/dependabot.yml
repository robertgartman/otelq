# Dependabot keeps CI actions and Python tooling current.
# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates
version: 2
updates:
  # GitHub Actions used by the workflows in .github/workflows/.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"

  # Python dependencies declared in pyproject.toml / uv.lock.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
    ignore:
      # The duckdb pin is exact and load-bearing: the duckdb-otlp community
      # extension is built per DuckDB version, so a bump must follow the
      # governance in context/adr/ADR-003 (validate the extension build first),
      # never an automatic Dependabot PR.
      - dependency-name: "duckdb"
